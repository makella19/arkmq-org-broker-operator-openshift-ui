env:
  browser: true
  es2021: true
extends:
  - eslint:recommended
  - plugin:react/recommended
  - plugin:@typescript-eslint/recommended
  - prettier
parser: '@typescript-eslint/parser'
parserOptions:
  ecmaFeatures:
    jsx: true
  ecmaVersion: 2016
  sourceType: module
plugins:
  - prettier
  - react
  - '@typescript-eslint'
rules:
  prettier/prettier:
    - error
settings:
  react:
    version: detect
overrides:
  - files:
      - 'scripts/**/*.js'
      - 'playwright/**/*.ts'
    env:
      node: true
      es2021: true
    rules:
      '@typescript-eslint/no-var-requires': off
